<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Calculadora Flask</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div class="container">
        <h1>Calculadora</h1>

        <form method="POST" action="/">
            <input type="number" step="any" name="num1" placeholder="Número 1" required>

            <select name="operacao" id="operacao" onchange="toggleNum2()">
                <option value="somar">Somar</option>
                <option value="subtrair">Subtrair</option>
                <option value="multiplicar">Multiplicar</option>
                <option value="dividir">Dividir</option>
                <option value="potencia">Potência</option>
                <option value="sqrt">Raiz Quadrada</option>
                <option value="log">Logaritmo</option>
            </select>

            <input type="number" step="any" name="num2" id="num2" placeholder="Número 2">

            <button type="submit">Calcular</button>
        </form>

        <a href="/">Limpar</a>

        {% if resultado %}
            <p class="resultado">{{ resultado }}</p>
        {% endif %}

        {% if erro %}
            <p class="erro">{{ erro }}</p>
        {% endif %}
    </div>

    <script>
        function toggleNum2() {
            let op = document.getElementById("operacao").value;
            let num2 = document.getElementById("num2");

            if (op === "sqrt" || op === "log") {
                num2.style.display = "none";
            } else {
                num2.style.display = "block";
            }
        }
    </script>

</body>
</html>
