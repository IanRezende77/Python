<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>
        {% if produto %}
            Editar Produto
        {% else %}
            Cadastrar Produto
        {% endif %}
    </title>
</head>
<body>

    <h1>
        {% if produto %}
            Editar Produto
        {% else %}
            Cadastrar Produto
        {% endif %}
    </h1>

    {% if erro %}
        <p style="color:red;">
            {{ erro }}
        </p>
    {% endif %}

    <form
        method="POST"
        action="{% if produto %}{{ url_for('editar_produto', produto_id=produto.id) }}{% else %}{{ url_for('cadastrar_produto') }}{% endif %}"
    >

        <label>Nome:</label>
        <input
            type="text"
            name="nome"
            value="{{ produto.nome if produto else '' }}"
            required
        >
        <br><br>

        <label>Categoria:</label>
        <input
            type="text"
            name="categoria"
            value="{{ produto.categoria if produto else '' }}"
            required
        >
        <br><br>

        <label>Preço:</label>
        <input
            type="number"
            step="0.01"
            name="preco"
            value="{{ produto.preco if produto else '' }}"
            required
        >
        <br><br>

        <label>Estoque:</label>
        <input
            type="number"
            name="estoque"
            value="{{ produto.estoque if produto else 0 }}"
            min="0"
            required
        >
        <br><br>

        <button type="submit">
            Salvar
        </button>

    </form>

    <br>

    <a href="{{ url_for('lista_produtos') }}">
        Voltar
    </a>

</body>
</html>
