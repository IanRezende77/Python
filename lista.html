<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Loja Tech</title>
</head>
<body>

    <h1>Produtos</h1>

    <a href="{{ url_for('cadastrar_produto') }}">
        Novo Produto
    </a>

    <hr>

    <table border="1">
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Categoria</th>
            <th>Preço</th>
            <th>Estoque</th>
            <th>Ações</th>
        </tr>

        {% for produto in produtos %}
        <tr>
            <td>{{ produto.id }}</td>
            <td>{{ produto.nome }}</td>
            <td>{{ produto.categoria }}</td>
            <td>R$ {{ "%.2f"|format(produto.preco) }}</td>
            <td>{{ produto.estoque }}</td>

            <td>
                <a href="{{ url_for('editar_produto', produto_id=produto.id) }}">
                    Editar
                </a>

                <form
                    action="{{ url_for('excluir_produto', produto_id=produto.id) }}"
                    method="POST"
                    style="display:inline;"
                >
                    <button type="submit">
                        Excluir
                    </button>
                </form>
            </td>
        </tr>
        {% endfor %}

    </table>

</body>
</html>
